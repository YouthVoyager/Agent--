services:
  gateway:
    build:
      context: .
    container_name: agent-gateway
    command:
      - -config
      - /etc/gateway/gateway.observability.json
    depends_on:
      otel-collector:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./configs/gateway.observability.json:/etc/gateway/gateway.observability.json:ro
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: agent-gateway-otel-collector
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "1777:1777"
      - "55679:55679"
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: agent-gateway-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    depends_on:
      mimir:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability

  mimir:
    image: grafana/mimir:2.12.0
    container_name: agent-gateway-mimir
    command:
      - -config.file=/etc/mimir/mimir.yaml
    ports:
      - "9009:9009"
    volumes:
      - ./observability/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir-data:/data/mimir
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.5.0
    container_name: agent-gateway-tempo
    command:
      - -config.file=/etc/tempo/tempo.yaml
    ports:
      - "3200:3200"
      - "14317:4317"
      - "14318:4318"
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - observability

  loki:
    image: grafana/loki:3.0.0
    container_name: agent-gateway-loki
    command:
      - -config.file=/etc/loki/loki.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.0.0
    container_name: agent-gateway-grafana
    depends_on:
      prometheus:
        condition: service_started
      mimir:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - observability

networks:
  observability:
    name: agent-gateway-observability

volumes:
  grafana-data:
  loki-data:
  mimir-data:
  prometheus-data:
  tempo-data:
