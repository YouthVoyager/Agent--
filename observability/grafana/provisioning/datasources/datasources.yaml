apiVersion: 1

datasources:
  - name: Mimir
    uid: Mimir
    type: prometheus
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true

  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    editable: false
    jsonData:
      httpMethod: POST

  - name: Tempo
    uid: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: Loki
        tags:
          - key: service.name
            value: service_name
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
      serviceMap:
        datasourceUid: Mimir

  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: trace_id
          matcherRegex: '"trace_id"[:=]"?([0-9a-f]{32})"?'
          datasourceUid: Tempo
          url: "$${__value.raw}"
