global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: agent-gateway-local

scrape_configs:
  - job_name: agent-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: mimir
    static_configs:
      - targets:
          - mimir:9009

  - job_name: tempo
    static_configs:
      - targets:
          - tempo:3200

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000

remote_write:
  - url: http://mimir:9009/api/v1/push
    queue_config:
      capacity: 10000
      max_samples_per_send: 2000
      max_shards: 10
